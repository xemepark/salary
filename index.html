      * 上班向後取整(ceil):08:19→08:30、08:46→09:00(早到被吸收)
      * 下班向前取整(floor):14:41→14:30、18:08→18:00(晚走不加分)
    - 上班不得早於標準、下班不得晚於標準(邊界限制)
    - 實際工時 = 取整後(下班 − 上班),跨午休扣 1hr,加請假/補休時數
    - 業務類型補貼:實際工時 >= 6hr → 享 7hr 標準,否則 8hr
    - 稽核 = min(max(0, 標準 − 實際), 4hr),取 0.5 單位

      * 3/2 趙彥維 08:19-14:41 → 取整 08:30-14:30 扣午休 = 5hr,差 3hr ✓
      * 3/3 徐沛淇 08:46-12:35 → 取整 10:30-12:30(邊界)不跨午休 = 2hr
        實際 < 6,標準 8,差 6 封頂 4hr ✓
      * 3/12 徐沛淇 10:29-18:08 → 取整 10:30-18:00 扣午休 = 6.5hr

<title>員工考勤薪資系統 V31</title>
<meta name="version" content="V31">
<meta name="build-date" content="2026-04-19">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Serif TC', 'Source Han Serif TC', Georgia, serif;
    background: #fafaf7;
    color: #1a1a1a;
    min-height: 100vh;
  }
  .num { font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums; }
  .sans { font-family: 'Noto Sans TC', -apple-system, 'Microsoft JhengHei', sans-serif; }
  .serif { font-family: 'Noto Serif TC', Georgia, serif; }
  button { cursor: pointer; font-family: inherit; border: none; background: transparent; }
  input { font-family: inherit; }
  input:focus, select:focus { outline: 2px solid #c9a961; outline-offset: -1px; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* Header */
  header {
    border-bottom: 1px solid #1a1a1a;
    background: #fafaf7;
    padding: 24px 48px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  header .title-group .eyebrow {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px; letter-spacing: 3px; color: #888; text-transform: uppercase;
  }
  header h1 {
    margin-top: 4px; font-size: 28px; font-weight: 600; letter-spacing: -0.5px;
  }
  header .actions { display: flex; gap: 12px; align-items: center; font-family: 'Noto Sans TC', sans-serif; flex-wrap: wrap; }
  header .period-box { font-size: 12px; color: #666; }
  header .period-box .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #999; }
  header .period-box .val { font-size: 14px; color: #1a1a1a; font-family: 'JetBrains Mono', monospace; }
  header .divider { width: 1px; height: 32px; background: #ddd; }

  .btn {
    padding: 8px 16px; font-size: 12px; letter-spacing: 1px;
    display: inline-flex; gap: 6px; align-items: center;
    font-family: 'Noto Sans TC', sans-serif;
    transition: all 0.15s ease;
  }
  .btn-primary { background: #1a1a1a; color: #fafaf7; }
  .btn-primary:hover { background: #333; }
  .btn-outline { border: 1px solid #1a1a1a; background: transparent; color: #1a1a1a; }
  .btn-outline:hover { background: #1a1a1a; color: #fafaf7; }
  .btn-gold { border: 1px solid #c9a961; color: #8a6d2a; background: transparent; }
  .btn-gold:hover { background: #c9a961; color: #fff; }
  .btn svg { display: block; }

  /* Toast */
  .toast {
    padding: 10px 48px; font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    border-bottom: 1px solid;
  }
  .toast.success { background: #eef7ee; color: #2a6; border-color: #4a8; }
  .toast.error { background: #fff0ee; color: #a22; border-color: #d43; }

  /* Upload screen */
  .upload-wrap { max-width: 720px; margin: 80px auto; padding: 0 48px; animation: slideIn 0.3s ease both; }
  .eyebrow-gold { font-family: 'Noto Sans TC', sans-serif; font-size: 11px; letter-spacing: 3px; color: #c9a961; text-transform: uppercase; margin-bottom: 8px; }
  h2.title { font-size: 36px; font-weight: 500; margin-bottom: 12px; line-height: 1.2; }
  .upload-wrap .desc { font-family: 'Noto Sans TC', sans-serif; color: #666; font-size: 14px; line-height: 1.7; margin-bottom: 32px; }

  .dropzone {
    border: 1.5px dashed #1a1a1a; background: #fff; padding: 60px 40px;
    text-align: center; cursor: pointer; transition: all 0.2s ease;
  }
  .dropzone:hover, .dropzone.drag { border-color: #c9a961; background: #fff9ee; }
  .dropzone svg { color: #1a1a1a; margin-bottom: 16px; }
  .dropzone .main { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .dropzone .hint { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; color: #888; }

  .error-box {
    margin-top: 16px; padding: 12px 16px;
    background: #fff0ee; border: 1px solid #d43; color: #a22;
    font-size: 13px; display: flex; gap: 8px; align-items: center;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .config-box {
    margin-top: 48px; padding: 24px 28px; background: #fff; border: 1px solid #e5e3dd;
  }
  .config-box .h {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 16px;
  }
  .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .config-grid label { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; color: #555; display: block; margin-bottom: 6px; }
  .config-grid input {
    width: 100%; padding: 8px 12px; border: 1px solid #ccc; font-size: 15px;
    background: #fafaf7; font-family: 'JetBrains Mono', monospace;
  }
  .config-note { font-family: 'Noto Sans TC', sans-serif; font-size: 11px; color: #999; margin-top: 12px; line-height: 1.6; }

  /* Main layout */
  .main-layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 85px); }
  .sidebar {
    border-right: 1px solid #e5e3dd; background: #fff;
    overflow-y: auto; max-height: calc(100vh - 85px);
  }
  .sidebar-head {
    padding: 20px 24px; border-bottom: 1px solid #e5e3dd;
    position: sticky; top: 0; background: #fff; z-index: 2;
  }
  .sidebar-head .h1 { font-family: 'Noto Sans TC', sans-serif; font-size: 10px; letter-spacing: 2px; color: #888; text-transform: uppercase; }
  .sidebar-head .h2 { font-size: 20px; font-weight: 500; margin-top: 4px; }
  .sidebar-head .count { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #888; font-weight: 400; }

  .emp-card {
    padding: 14px 24px; border-bottom: 1px solid #f0eeea;
    border-left: 3px solid transparent;
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer; transition: all 0.15s ease;
  }
  .emp-card:hover { border-color-left: #1a1a1a; background: #fafaf7; }
  .emp-card.active { border-left-color: #c9a961; background: #fff9ee; }
  .emp-card .name { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
  .emp-card .dot { width: 6px; height: 6px; background: #c9a961; border-radius: 50%; }
  .emp-card .wtype {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px; color: #888; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
  }
  .emp-card .salary { text-align: right; margin-left: 12px; }
  .emp-card .salary .n { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; }
  .emp-card .salary .u { font-family: 'Noto Sans TC', sans-serif; font-size: 10px; color: #999; }
  .emp-card .salary .u.default { color: #c9a961; }

  main.detail { padding: 32px 48px; overflow-y: auto; max-height: calc(100vh - 85px); }

  /* Overview */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    border: 1px solid #1a1a1a; background: #fff; margin-bottom: 32px;
  }
  .stat { padding: 20px 24px; border-right: 1px solid #e5e3dd; background: #fff; color: #1a1a1a; }
  .stat:last-child { border-right: none; }
  .stat.accent { background: #1a1a1a; color: #fafaf7; }
  .stat .lbl { font-family: 'Noto Sans TC', sans-serif; font-size: 10px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
  .stat.accent .lbl { color: #c9a961; }
  .stat .val-group { display: flex; align-items: baseline; gap: 6px; }
  .stat .val { font-family: 'JetBrains Mono', monospace; font-size: 28px; font-weight: 500; letter-spacing: -0.5px; }
  .stat .unit { font-family: 'Noto Sans TC', sans-serif; font-size: 11px; color: #888; }
  .stat.accent .unit { color: #c9a961; }

  .section-h {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px; letter-spacing: 2px; color: #888; text-transform: uppercase; margin-bottom: 12px;
  }

  .table-box { background: #fff; border: 1px solid #e5e3dd; }
  .table-head, .table-row {
    display: grid;
    grid-template-columns: 1.4fr 1.8fr 0.8fr 0.8fr 0.8fr 0.8fr 1.1fr 1.1fr 0.4fr;
    padding: 12px 20px; align-items: center;
  }
  .table-head {
    padding: 14px 20px; border-bottom: 1px solid #1a1a1a;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px; letter-spacing: 1px; color: #666; text-transform: uppercase;
  }
  .table-row { border-bottom: 1px solid #f0eeea; font-size: 13px; cursor: pointer; transition: background 0.1s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: #fafaf7; }
  .table-row .name { font-family: 'Noto Serif TC', serif; font-weight: 500; display: flex; align-items: center; gap: 6px; }
  .default-badge {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 9px; padding: 1px 6px;
    background: #fff9ee; color: #8a6d2a;
    border: 1px solid #e8d89a; border-radius: 2px; font-weight: 400;
  }
  .table-row .wtype { font-family: 'Noto Sans TC', sans-serif; color: #666; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .r { text-align: right; font-family: 'JetBrains Mono', monospace; }
  .dim { color: #bbb; }
  .warn { color: #b85; }
  .good { color: #285; }

  .alert-strip {
    padding: 12px 16px; background: #fff9ee; border: 1px solid #e8d89a;
    color: #6b5a2a; font-size: 13px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 10px;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .footer-note {
    margin-top: 24px; padding: 16px 20px;
    background: #fff9ee; border: 1px solid #e8d89a;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px; line-height: 1.7; color: #6b5a2a;
  }

  /* Detail */
  .detail-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid #1a1a1a;
  }
  .back-btn {
    font-family: 'Noto Sans TC', sans-serif;
    color: #888; font-size: 12px;
    display: inline-flex; align-items: center; gap: 4px;
    margin-bottom: 16px;
  }
  .back-btn:hover { color: #1a1a1a; }
  .detail-name { font-size: 40px; font-weight: 500; letter-spacing: -1px; }
  .detail-wtype { font-family: 'Noto Sans TC', sans-serif; color: #666; font-size: 13px; margin-top: 6px; }
  .detail-salary-big { font-family: 'JetBrains Mono', monospace; font-size: 40px; font-weight: 500; letter-spacing: -1px; }

  .config-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .cf {
    background: #fff; border: 1px solid #e5e3dd; padding: 14px 18px;
  }
  .cf .row { font-family: 'Noto Sans TC', sans-serif; font-size: 11px; color: #666; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
  .cf .tiny { font-size: 10px; color: #999; }
  .cf .display {
    display: flex; align-items: baseline; gap: 6px;
    cursor: pointer;
  }
  .cf .display .v { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; }
  .cf .display .u { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; color: #888; }
  .cf .display .edit-icon { color: #c9a961; margin-left: auto; }
  .cf .edit-row { display: flex; gap: 6px; align-items: center; }
  .cf .edit-row input {
    flex: 1; padding: 6px 10px; border: 1px solid #1a1a1a;
    font-size: 18px; background: #fafaf7;
    font-family: 'JetBrains Mono', monospace;
  }
  .cf .edit-row .save { background: #1a1a1a; color: #fafaf7; padding: 6px 10px; }
  .cf .edit-row .cancel { background: transparent; color: #888; border: 1px solid #ccc; padding: 6px 10px; }

  .wage-info {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    padding: 14px 18px; background: #fff; border: 1px solid #e5e3dd;
    font-family: 'Noto Sans TC', sans-serif; font-size: 12px;
  }

  .breakdown { background: #fff; border: 1px solid #e5e3dd; margin-bottom: 32px; }
  .b-row { padding: 12px 20px; border-bottom: 1px solid #f0eeea; display: flex; justify-content: space-between; align-items: center; }
  .b-row .lbl { font-family: 'Noto Sans TC', sans-serif; font-size: 13px; color: #555; }
  .b-row .val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 500; }
  .b-total { padding: 16px 20px; background: #1a1a1a; color: #fafaf7; display: flex; justify-content: space-between; align-items: center; }
  .b-total .lbl { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; letter-spacing: 1px; }
  .b-total .val { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; }

  .small-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0; border: 1px solid #e5e3dd; background: #fff; margin-bottom: 32px; }
  .sm { padding: 16px 18px; border-right: 1px solid #e5e3dd; }
  .sm:last-child { border-right: none; }
  .sm .lbl { font-family: 'Noto Sans TC', sans-serif; font-size: 10px; letter-spacing: 1.5px; color: #888; text-transform: uppercase; margin-bottom: 6px; }
  .sm .val { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; }

  .leaves-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 32px; }
  .leave-card { padding: 14px 16px; background: #fff; border: 1px solid #e5e3dd; border-left: 3px solid #ccc; }
  .leave-card.deduct { border-color: #e8c89a; border-left-color: #c9a961; }
  .leave-card .lbl { font-family: 'Noto Sans TC', sans-serif; font-size: 11px; color: #666; margin-bottom: 4px; }
  .leave-card .lbl .flag { color: #b85; margin-left: 6px; }
  .leave-card .val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 500; }
  .leave-card .val .u { font-size: 11px; color: #888; font-family: 'Noto Sans TC', sans-serif; }

  .records-list { background: #fff; border: 1px solid #e5e3dd; max-height: 400px; overflow-y: auto; }
  .records-head, .records-row {
    display: grid; grid-template-columns: 1.3fr 1.2fr 1.2fr 2fr;
    padding: 8px 16px; align-items: center;
  }
  .records-head {
    padding: 10px 16px; border-bottom: 1px solid #1a1a1a;
    font-family: 'Noto Sans TC', sans-serif; font-size: 10px; letter-spacing: 1px;
    color: #666; text-transform: uppercase; position: sticky; top: 0; background: #fff;
  }
  .records-row { border-bottom: 1px solid #f0eeea; font-size: 12px; }
  .records-row:last-child { border-bottom: none; }
  .records-row .d { font-family: 'JetBrains Mono', monospace; color: #555; }
  .records-row .t { font-family: 'JetBrains Mono', monospace; }
  .records-row .t.empty { color: #bbb; }
  .records-row .note { font-family: 'Noto Sans TC', sans-serif; font-size: 11px; color: #555; }
  .records-row .note.empty { color: #bbb; }

  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: slideIn 0.3s ease both; }

  .hidden { display: none !important; }

  /* icons */
  .icon { width: 14px; height: 14px; display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<header>
  <div class="title-group">
    <div class="eyebrow">Payroll System · <span style="color:#c9a961">V31</span></div>
    <h1 class="serif">員工考勤薪資系統</h1>
  </div>
  <div class="actions" id="headerActions">
    <!-- Filled when data loaded -->
  </div>
</header>

<div id="toast" class="toast hidden"></div>

<!-- Upload Screen -->
<div id="uploadScreen" class="upload-wrap">
  <div class="eyebrow-gold">01 — Upload</div>
  <h2 class="title serif">上傳打卡記錄報表</h2>
  <p class="desc">請上傳人資系統匯出的 Excel 打卡報表(.xlsx)。系統會自動解析員工姓名、工時名稱、打卡時間、說明欄位,並彙整出勤、加班、請假資料。</p>

  <div id="dropzone" class="dropzone" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    <svg class="icon" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/></svg>
    <div class="main" id="dropMain">點擊或拖曳檔案至此處</div>
    <div class="hint">支援 .xlsx 格式 · 自動辨識表頭欄位</div>
  </div>

  <div id="uploadError" class="error-box hidden"></div>

  <div class="config-box">
    <div class="h">預設參數(上傳前可先設定)</div>
    <div class="config-grid">
      <div>
        <label>預設月薪(TWD)</label>
        <input type="number" id="defaultSalary" value="30000">
      </div>
      <div>
        <label>當月應出勤天數</label>
        <input type="number" id="defaultWorkDays" value="22">
      </div>
    </div>
    <div class="config-note">上傳打卡檔後,可在右上角「月薪範本」下載已預填員工姓名的 Excel,填入每人月薪後再透過「匯入月薪」批次套用,也可以手動個別編輯。扣薪規則:事假扣全薪、普通傷病假扣半薪。</div>
  </div>
</div>

<!-- Main Layout (hidden until file uploaded) -->
<div id="mainLayout" class="main-layout hidden">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="h1">Employees</div>
      <div class="h2 serif">員工清單 <span class="count" id="empCount"></span></div>
    </div>
    <div id="empListEl"></div>
  </aside>
  <main class="detail" id="detailPanel"></main>
</div>

<input type="file" id="salaryFileInput" accept=".xlsx,.xls" style="display:none">

<script>
// =============== 版本資訊 ===============
const APP_VERSION = 'V31';
const APP_BUILD_DATE = '2026-04-19';

// =============== State ===============
const state = {
  rawData: null,
  fileName: '',
  period: '',
  employees: {},
  selectedEmp: null,
  defaultSalary: 30000,
  defaultWorkDays: 22,
  recordSort: 'asc', // 'asc' = 日期升冪(預設), 'desc' = 降冪
  salaryImportOrder: [], // 月薪匯入時的員工順序(影響薪資匯出的排序)
};

// =============== SVG icons ===============
const ICONS = {
  download: '<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
  sheet: '<svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>',
  close: '<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  check: '<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>',
  edit: '<svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
  chevron: '<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>',
  alert: '<svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
};

// =============== Utility ===============
function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.className = 'toast ' + type;
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 7000);
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// =============== Parse uploaded Excel ===============
async function parseFile(file) {
  document.getElementById('uploadError').classList.add('hidden');
  document.getElementById('dropMain').textContent = '解析中...';
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false, dateNF: 'yyyy-mm-dd hh:mm' });

    let headerRow = -1;
    for (let i = 0; i < Math.min(rows.length, 15); i++) {
      if (rows[i] && rows[i].some(c => c === '員工姓名')) { headerRow = i; break; }
    }
    if (headerRow === -1) throw new Error('找不到表頭列,請確認檔案格式');

    const header = rows[headerRow];
    const col = {
      name: header.indexOf('員工姓名'),
      workType: header.indexOf('工時名稱'),
      date: header.indexOf('上班日期'),
      punchIn: header.indexOf('上班打卡時間'),
      punchOut: header.indexOf('下班打卡時間'),
      note: header.indexOf('說明'),
    };
    if (col.name === -1) throw new Error('找不到"員工姓名"欄位');

    const records = [];
    const dates = new Set();

    // 統一把任意型別的日期/時間值轉成字串
    // 可能來源:Date 物件、Excel serial number、"2026-03-17"、"2026-03-17 08:30"、"3/17/26" 等
    const toDateStr = (v) => {
      if (!v) return '';
      if (v instanceof Date) {
        const y = v.getFullYear();
        const m = String(v.getMonth() + 1).padStart(2, '0');
        const d = String(v.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }
      if (typeof v === 'number') {
        // Excel date serial (天數 from 1899-12-30)
        const d = new Date(Math.round((v - 25569) * 86400000));
        if (isNaN(d)) return '';
        const y = d.getUTCFullYear();
        const mo = String(d.getUTCMonth() + 1).padStart(2, '0');
        const da = String(d.getUTCDate()).padStart(2, '0');
        return `${y}-${mo}-${da}`;
      }
      if (typeof v === 'string') {
        // 可能是 "2026-03-17 08:30" 或 "3/17/26" 等
        const ymd = v.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
        if (ymd) return `${ymd[1]}-${String(ymd[2]).padStart(2,'0')}-${String(ymd[3]).padStart(2,'0')}`;
        const mdy = v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
        if (mdy) {
          let [_, m, d, y] = mdy;
          if (y.length === 2) y = '20' + y;
          return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        }
        return v.split(' ')[0];
      }
      return '';
    };
    // 統一把打卡時間值轉成 "HH:MM" 字串,無效回空字串
    const toTimeStr = (v) => {
      if (!v) return '';
      if (v instanceof Date) {
        return `${String(v.getHours()).padStart(2,'0')}:${String(v.getMinutes()).padStart(2,'0')}`;
      }
      if (typeof v === 'number') {
        const d = new Date(Math.round((v - 25569) * 86400000));
        if (isNaN(d)) return '';
        return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
      }
      if (typeof v === 'string') {
        // 形式可能是 "2026-03-17 08:30" 或 "08:30" 或 "3/17/26 8:30"
        const hm = v.match(/(\d{1,2}):(\d{2})/);
        if (hm) return `${String(hm[1]).padStart(2,'0')}:${hm[2]}`;
        return '';
      }
      return '';
    };

    for (let i = headerRow + 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r || !r[col.name]) continue;
      const dateStr = toDateStr(r[col.date]);
      const rec = {
        name: String(r[col.name]).trim(),
        workType: r[col.workType] || '',
        date: dateStr,                       // 統一 'yyyy-mm-dd'
        punchIn: toTimeStr(r[col.punchIn]),  // 統一 'HH:MM' 或 ''
        punchOut: toTimeStr(r[col.punchOut]),
        note: r[col.note] || '',
      };
      records.push(rec);
      if (dateStr) dates.add(dateStr);
    }

    const dateArr = [...dates].sort();
    let periodStr = '';
    if (dateArr.length > 0) {
      const first = dateArr[0], last = dateArr[dateArr.length - 1];
      periodStr = first === last ? first : `${first} ~ ${last}`;
      if (first.slice(0, 7) === last.slice(0, 7)) {
        const [y, m] = first.split('-');
        periodStr = `${y}年${parseInt(m)}月`;
      }
    }

    const empMap = {};
    for (const r of records) {
      if (!empMap[r.name]) empMap[r.name] = { name: r.name, workType: r.workType, records: [] };
      empMap[r.name].records.push(r);
    }
    for (const name in empMap) {
      empMap[name].stats = calcStats(empMap[name].records, empMap[name].workType);
    }

    state.rawData = records;
    state.period = periodStr;
    state.employees = empMap;
    state.fileName = file.name;
    state.defaultSalary = Number(document.getElementById('defaultSalary').value) || 30000;
    state.defaultWorkDays = Number(document.getElementById('defaultWorkDays').value) || 22;

    render();
  } catch (e) {
    document.getElementById('dropMain').textContent = '點擊或拖曳檔案至此處';
    const err = document.getElementById('uploadError');
    err.innerHTML = ICONS.alert + ' 解析失敗:' + esc(e.message);
    err.classList.remove('hidden');
  }
}

// =============== Stats computation ===============
function calcStats(records, workTypeName) {
  const rule = getWorkTypeRule(workTypeName);
  const punchedDates = getPunchedDates(records);

  // 計算本月日期範圍(records 中所有日期的 min / max),避免跨月請假把上月時數算入本月
  let minDate = '', maxDate = '';
  for (const r of records) {
    if (r.date) {
      if (!minDate || r.date < minDate) minDate = r.date;
      if (!maxDate || r.date > maxDate) maxDate = r.date;
    }
  }
  const monthRange = minDate ? { minDate, maxDate } : null;

  const s = {
    totalDays: records.length, punchedDays: 0, missedPunch: 0, lateNote: 0,
    daysWithNote: 0,  // 有備註(未完整打卡)的天數 — 這些不算漏打卡
    overtime: [], overtimeComp: [], otHours: 0, leaveHours: {},
    leaves: { 事假:[], 特休假:[], 普通傷病假:[], 生理假:[], 公假:[], 婚假:[], 喪假:[] },
    rule,
  };

  const seenLeaveRanges = new Set();
  const seenOtRanges = new Set();

  for (const r of records) {
    const hasIn = r.punchIn && r.punchIn !== '';
    const hasOut = r.punchOut && r.punchOut !== '';
    const hasNote = !!(r.note && r.note.trim());
    if (hasIn && hasOut) {
      s.punchedDays++;
    } else {
      // 未完整打卡
      if (hasNote) s.daysWithNote++;   // 但有備註 → 正當缺席,不算漏打卡
      else s.missedPunch++;              // 既沒打卡又沒備註 → 疑似漏打卡
    }
    if (!r.note) continue;
    if (!r.note.startsWith('[') && r.note.includes('忘')) s.lateNote++;
    const m = r.note.match(/\[([^\]]+)\](.+)/);
    if (!m) continue;
    const type = m[1], rest = m[2];
    const descKey = `${type}|${rest.trim()}`;

    if (type === '加班') {
      if (seenOtRanges.has(descKey)) continue;
      seenOtRanges.add(descKey);
      const hours = parseHours(rest, rule, punchedDates, monthRange);
      s.overtime.push({ date: r.date, desc: rest.trim(), hours });
      s.otHours += hours;
    } else if (type === '加班補休') {
      if (seenOtRanges.has(descKey)) continue;
      seenOtRanges.add(descKey);
      const hours = parseHours(rest, rule, punchedDates, monthRange);
      s.overtimeComp.push({ date: r.date, desc: rest.trim(), hours });
    } else {
      if (seenLeaveRanges.has(descKey)) continue;
      seenLeaveRanges.add(descKey);
      const hours = parseHours(rest, rule, punchedDates, monthRange);
      const key = type.startsWith('喪假') ? '喪假' : type;
      if (!s.leaves[key]) s.leaves[key] = [];
      s.leaves[key].push({ date: r.date, desc: rest.trim(), hours });
      s.leaveHours[key] = (s.leaveHours[key] || 0) + hours;
    }
  }
  return s;
}

// =============== 工時類型規則 ===============
// 依工時類型推斷上班時段與排休規則
// isShift = true 代表排休制(月休8天,休息日看打卡記錄),false 代表週休制(週六日休)
const WORK_TYPES = {
  '預設':           { startH: 8,  startM: 30, endH: 17, endM: 30, isShift: false },
  '楊梅-週一至週五': { startH: 8,  startM: 30, endH: 17, endM: 30, isShift: false },
  '楊梅-排休(新)':  { startH: 8,  startM: 30, endH: 17, endM: 30, isShift: true  },
  '門市-排休':      { startH: 9,  startM: 0,  endH: 18, endM: 0,  isShift: true  },
  '門市業務':       { startH: 10, startM: 30, endH: 19, endM: 30, isShift: true  },
};
// 預設 fallback(遇到未登錄的工時類型)
const DEFAULT_WORK_TYPE = { startH: 8, startM: 30, endH: 17, endM: 30, isShift: false };

function getWorkTypeRule(workTypeName) {
  return WORK_TYPES[workTypeName] || DEFAULT_WORK_TYPE;
}

// 從員工打卡記錄中,抓出「有打卡的日期集合」→ 推斷排休制員工的實際工作日
function getPunchedDates(records) {
  const set = new Set();
  for (const r of records) {
    const hasIn = r.punchIn && r.punchIn !== '';
    const hasOut = r.punchOut && r.punchOut !== '';
    if (hasIn || hasOut) {
      if (r.date) set.add(r.date);
    }
  }
  return set;
}

function isWeekday(d) {
  const w = d.getDay();
  return w >= 1 && w <= 5;
}

function formatDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// 判斷某日期是否為該員工的「工作日」
// - 週休制:週一至週五 = 工作日
// - 排休制:該日有打卡記錄 = 工作日(沒打卡 = 休息日)
function isWorkingDay(date, rule, punchedDates) {
  if (rule.isShift) {
    return punchedDates.has(formatDateKey(date));
  }
  return isWeekday(date);
}

// 計算請假/加班區間的「實際工時」
// - 單日:用時間差,扣午休(若跨午休 12:30~13:30 且總長 >= 5 小時)
// - 跨日:逐日累加工作日,依員工工時類型的上班時段為基準
function parseHours(text, rule, punchedDates, monthRange) {
  rule = rule || DEFAULT_WORK_TYPE;
  punchedDates = punchedDates || new Set();
  // monthRange = { minDate, maxDate }(YYYY-MM-DD),超出範圍的日期不計入(跨月請假只算本月)

  const parts = text.split('~');
  if (parts.length !== 2) return 0;

  const pt = (s) => {
    const dm = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    const tm = s.match(/(\d{1,2}):(\d{2})/);
    if (!tm) return null;
    return {
      dateStr: dm ? `${dm[1]}-${dm[2]}-${dm[3]}` : null,
      h: parseInt(tm[1]), m: parseInt(tm[2])
    };
  };
  const a = pt(parts[0]), b = pt(parts[1]);
  if (!a || !b) return 0;

  const aDateStr = a.dateStr || '2000-01-01';
  const bDateStr = b.dateStr || aDateStr;

  // 單日:直接算時間差
  if (aDateStr === bDateStr) {
    // 若有月範圍且該日期不在範圍內,不計
    if (monthRange && (aDateStr < monthRange.minDate || aDateStr > monthRange.maxDate)) return 0;
    return calcSingleDayHours(a.h, a.m, b.h, b.m);
  }

  // 跨日:逐日累加工作日
  const startDate = new Date(`${aDateStr}T00:00:00`);
  const endDate = new Date(`${bDateStr}T00:00:00`);
  if (endDate < startDate) return 0;

  let total = 0;
  const cursor = new Date(startDate);
  while (cursor <= endDate) {
    const cursorStr = formatDateKey(cursor);
    // 月範圍過濾:跨月請假時排除本月以外的日期(避免 3/31~4/1 把 3/31 也算進 4 月)
    const inMonth = !monthRange || (cursorStr >= monthRange.minDate && cursorStr <= monthRange.maxDate);
    if (inMonth && isWorkingDay(cursor, rule, punchedDates)) {
      const isFirst = cursor.getTime() === startDate.getTime();
      const isLast = cursor.getTime() === endDate.getTime();
      if (isFirst) {
        total += calcSingleDayHours(a.h, a.m, rule.endH, rule.endM);
      } else if (isLast) {
        total += calcSingleDayHours(rule.startH, rule.startM, b.h, b.m);
      } else {
        total += calcSingleDayHours(rule.startH, rule.startM, rule.endH, rule.endM);
      }
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  return Math.round(total * 100) / 100;
}

// 單日內某時段的工時 — 用於「實際打卡時段」
// - 若時段跨越午休(12:30~13:30)且總長 >= 5 小時 → 扣 1 小時午休
// - 每日上限 8 小時
function calcSingleDayHours(h1, m1, h2, m2) {
  const start = h1 + m1 / 60;
  const end = h2 + m2 / 60;
  if (end <= start) return 0;
  let diff = end - start;
  if (start <= 12.5 && end >= 13.5 && diff >= 5) diff -= 1;
  if (diff > 8) diff = 8;
  return Math.round(diff * 100) / 100;
}

// 請假/加班補休的時數計算 — 單純的時間差
// - 不扣午休(員工請假時間已是指定範圍,不應再扣)
// - 上限 8 小時
function calcLeaveHoursRange(h1, m1, h2, m2) {
  const start = h1 + m1 / 60;
  const end = h2 + m2 / 60;
  if (end <= start) return 0;
  let diff = end - start;
  if (diff > 8) diff = 8;
  return Math.round(diff * 100) / 100;
}

// 推算當月總天數與平日天數
function getMonthInfo() {
  for (const name in state.employees) {
    for (const r of state.employees[name].records) {
      if (r.date) {
        const [y, m] = r.date.split('-').map(Number);
        const totalDays = new Date(y, m, 0).getDate();
        let weekdays = 0;
        for (let d = 1; d <= totalDays; d++) {
          const w = new Date(y, m - 1, d).getDay();
          if (w !== 0 && w !== 6) weekdays++;
        }
        return { totalDays, weekdays };
      }
    }
  }
  return { totalDays: 30, weekdays: 22 };
}

function calcSalary(name) {
  const emp = state.employees[name];
  if (!emp) return null;
  const monthly = emp.salary ?? state.defaultSalary;
  const wd = emp.workDays ?? state.defaultWorkDays;  // 保留應出勤天數設定(顯示用,不再影響日薪)

  // 統一算薪基準(勞基法標準):
  // 日薪 = 月薪 / 30
  // 時薪 = 日薪 / 8 = 月薪 / 240
  const dailyWage = monthly / 30;
  const hourlyWage = dailyWage / 8;

  const personalHrs = emp.stats.leaveHours['事假'] || 0;
  const sickHrs = emp.stats.leaveHours['普通傷病假'] || 0;

  // 扣薪統一用時薪 × 時數
  const personalDeduct = Math.round(personalHrs * hourlyWage);       // 事假全扣
  const sickDeduct = Math.round(sickHrs * hourlyWage * 0.5);         // 普傷半扣

  // 漏打卡計算:
  // - 排休制(含「排休」):應出勤 = 本月總天數 − 8
  // - 週休制(預設 / 含「週休」 / 楊梅-週一至週五):應出勤 = 本月非六日天數
  // 漏打卡天數 = max(0, 應出勤 − 完整打卡天數 − 有備註未完整打卡天數)
  const isShift = emp.stats.rule.isShift;
  const { totalDays: monthTotalDays, weekdays: monthWeekdays } = getMonthInfo();
  const expectedWorkDays = isShift ? (monthTotalDays - 8) : monthWeekdays;
  const fullPunchDays = emp.stats.punchedDays;
  const excusedDays = emp.stats.daysWithNote;
  const missedDays = Math.max(0, expectedWorkDays - fullPunchDays - excusedDays);
  // 漏打卡扣薪 = 漏打卡天數 × 日薪(= 8 × 時薪,與事假 1 天完全等價)
  const missedDeduct = Math.round(missedDays * dailyWage);

  // ===== 稽核計算(全月累加) =====
  // 每日比對「實際時數」vs「標準工時」,不足則計稽核
  // 規則同員工 sheet:
  //   - 只缺一張卡、漏打卡日、排休日加班(只有[加班])、< 0.5hr 不足 → 不計
  //   - 業務類型整天請假 → 標準 8hr,其餘業務日 → 標準 7hr
  //   - 其他類型一律 8hr
  const isSalesRole = (emp.workType || '').includes('業務');
  let auditHours = 0;
  let auditDeduct = 0;
  for (const r of emp.records) {
    if (!r) continue;
    const hasIn = !!r.punchIn;
    const hasOut = !!r.punchOut;
    const hasNote = !!(r.note && r.note.trim());

    // 漏打卡日(缺卡+無備註)不計
    if ((!hasIn || !hasOut) && !hasNote) continue;
    // 只缺一張卡(XOR)不計
    if (hasIn !== hasOut) continue;

    // 排休日加班:無打卡 + 只有 [加班] 備註
    const hasPunch = hasIn || hasOut;
    const segments = parseAllLeavesFromNote(r, emp.stats.rule);
    const hasOnlyOvertime = segments.length > 0 && segments.every(s => s.type === '加班');
    if (!hasPunch && hasOnlyOvertime) continue;

    // 楊梅類週末判斷(移到算完工時後處理)
    const isYangMei = (emp.workType || '').includes('楊梅-週一至週五')
                  || (emp.workType || '').includes('楊梅-排休');
    let isYangMeiWeekend = false;
    if (isYangMei && r.date) {
      const [y, m, d] = r.date.split('-').map(Number);
      const wd = new Date(y, m - 1, d).getDay();
      isYangMeiWeekend = (wd === 0 || wd === 6);
    }

    const { actualHours, isFullDayLeave } = calcDayActualHours(r, emp.stats.rule);
    let rawShortfall = 0;

    if (isFullDayLeave) {
      // 整天請假:比對 8hr 標準
      rawShortfall = Math.max(0, 8 - actualHours);
    } else if (hasPunch) {
      // 有打卡日 — V29 規則
      const rule = emp.stats.rule;
      const stdIn = rule.startH + rule.startM / 60;
      const stdOut = rule.endH + rule.endM / 60;

      const [ih, im] = r.punchIn.split(':').map(Number);
      const [oh, om] = r.punchOut.split(':').map(Number);
      const rawIn = ih + im / 60;
      const rawOut = oh + om / 60;

      const paidCover = segments
        .filter(s => s.type !== '加班')
        .reduce((sum, s) => sum + s.hours, 0);

      // 實際工時(扣午休 if 跨)
      let workHours = Math.max(0, rawOut - rawIn);
      if (rawIn <= 12.5 && rawOut >= 13.5 && workHours >= 5) workHours -= 1;
      workHours += paidCover;

      if (isYangMeiWeekend) {
        // 楊梅週末:工時 > 5 豁免、≤ 5 用 8 − 工時
        if (workHours > 5) {
          rawShortfall = 0;
        } else {
          rawShortfall = Math.max(0, 8 - workHours);
        }
      } else if (workHours > 7) {
        rawShortfall = 0;
      } else {
        const outTarget = (isSalesRole && workHours > 6) ? (stdOut - 1) : stdOut;
        const late = Math.max(0, rawIn - (stdIn + 0.25));
        const earlyOut = Math.max(0, outTarget - rawOut);
        rawShortfall = late + earlyOut;
        rawShortfall = Math.max(0, rawShortfall - paidCover);
      }
    }
    rawShortfall = Math.min(rawShortfall, 4);

    const shortfall = Math.round(rawShortfall * 2) / 2;
    if (shortfall >= 0.5) {
      auditHours += shortfall;
      auditDeduct += shortfall * hourlyWage;
    }
  }
  auditHours = Math.round(auditHours * 100) / 100;
  auditDeduct = Math.round(auditDeduct);

  const totalDeduct = personalDeduct + sickDeduct + missedDeduct + auditDeduct;
  const finalSalary = monthly - totalDeduct;
  return {
    monthly, workDays: wd,
    dailyWage: Math.round(dailyWage), hourlyWage: Math.round(hourlyWage),
    personalHrs, sickHrs, personalDeduct, sickDeduct,
    isShift, monthTotalDays, monthWeekdays, expectedWorkDays,
    missedDays, missedDeduct,
    auditHours, auditDeduct,
    totalDeduct, finalSalary,
    otHours: emp.stats.otHours,
    otCompHours: emp.stats.overtimeComp.reduce((s, x) => s + x.hours, 0),
  };
}

// =============== Actions ===============
function downloadTemplate() {
  const rows = [['員工姓名', '月薪(TWD)', '應出勤天數(可選填)']];
  const names = Object.keys(state.employees).sort((a,b) => a.localeCompare(b, 'zh-Hant'));
  for (const n of names) {
    rows.push([n, state.employees[n].salary ?? '', state.employees[n].workDays ?? '']);
  }
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:14},{wch:14},{wch:20}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '員工月薪設定');
  XLSX.writeFile(wb, `員工月薪範本_${state.period || ''}.xlsx`);
}

async function importSalary(file) {
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
    let headerRow = -1;
    for (let i = 0; i < Math.min(rows.length, 10); i++) {
      if (rows[i] && rows[i].some(c => typeof c === 'string' && c.includes('員工姓名'))) { headerRow = i; break; }
    }
    if (headerRow === -1) throw new Error('找不到表頭("員工姓名"欄位)');
    const header = rows[headerRow].map(h => typeof h === 'string' ? h : '');
    const nameIdx = header.findIndex(h => h.includes('員工姓名'));
    const salaryIdx = header.findIndex(h => h.includes('月薪') || h.includes('薪資'));
    const daysIdx = header.findIndex(h => h.includes('出勤天數') || h.includes('應出勤'));
    if (nameIdx === -1 || salaryIdx === -1) throw new Error('必須有"員工姓名"與"月薪"欄位');

    let updated = 0, skipped = 0;
    const notFound = [];
    const importOrder = [];  // 記錄本次匯入的員工順序
    for (let i = headerRow + 1; i < rows.length; i++) {
      const r = rows[i];
      if (!r || !r[nameIdx]) continue;
      const name = String(r[nameIdx]).trim();
      const sal = r[salaryIdx];
      if (sal === null || sal === undefined || sal === '') { skipped++; continue; }
      const salNum = Number(sal);
      if (isNaN(salNum)) { skipped++; continue; }
      if (!state.employees[name]) { notFound.push(name); continue; }
      state.employees[name].salary = salNum;
      if (daysIdx !== -1 && r[daysIdx] !== null && r[daysIdx] !== undefined && r[daysIdx] !== '') {
        const d = Number(r[daysIdx]);
        if (!isNaN(d)) state.employees[name].workDays = d;
      }
      if (!importOrder.includes(name)) importOrder.push(name);
      updated++;
    }
    // 儲存匯入順序,影響薪資匯出時的員工排序
    state.salaryImportOrder = importOrder;
    let msg = `✓ 已匯入 ${updated} 位員工的月薪`;
    if (skipped > 0) msg += ` · 跳過 ${skipped} 筆(金額未填)`;
    if (notFound.length > 0) msg += ` · 找不到對應員工:${notFound.join('、')}`;
    showToast(msg, notFound.length > 0 ? 'error' : 'success');
    render();
  } catch (e) {
    showToast('✗ 匯入失敗:' + e.message, 'error');
  }
}

// 把一筆 record 的說明解析成「當日」的請假/加班時數
// 若 note 是跨日請假,只算當天被涵蓋的部分
function calcDayLeaveFromNote(record, rule) {
  if (!record.note || !record.note.startsWith('[')) {
    return { type: null, hours: 0, desc: record.note || '' };
  }
  const m = record.note.match(/\[([^\]]+)\](.+)/);
  if (!m) return { type: null, hours: 0, desc: record.note };
  const type = m[1];
  const rest = m[2];

  // 抓該筆 record 當天的日期(已統一為 yyyy-mm-dd)
  const dateStr = record.date || '';
  if (!dateStr) return { type, hours: 0, desc: rest.trim() };

  // 解析區間起訖
  const parts = rest.split('~');
  if (parts.length !== 2) return { type, hours: 0, desc: rest.trim() };
  const pt = (s) => {
    const dm = s.match(/(\d{4})-(\d{2})-(\d{2})/);
    const tm = s.match(/(\d{1,2}):(\d{2})/);
    if (!tm) return null;
    return {
      dateStr: dm ? `${dm[1]}-${dm[2]}-${dm[3]}` : null,
      h: parseInt(tm[1]), m: parseInt(tm[2])
    };
  };
  const a = pt(parts[0]), b = pt(parts[1]);
  if (!a || !b) return { type, hours: 0, desc: rest.trim() };

  const aDateStr = a.dateStr || dateStr;
  const bDateStr = b.dateStr || aDateStr;

  let hours = 0;
  if (aDateStr === bDateStr) {
    // 單日:僅在該日期匹配時才計算。請假時數不扣午休、上限 8hr
    if (dateStr === aDateStr) hours = calcLeaveHoursRange(a.h, a.m, b.h, b.m);
  } else {
    // 跨日:依該筆記錄的日期決定要算的時段
    if (dateStr === aDateStr) {
      // 起始日
      hours = calcLeaveHoursRange(a.h, a.m, rule.endH, rule.endM);
    } else if (dateStr === bDateStr) {
      // 結束日
      hours = calcLeaveHoursRange(rule.startH, rule.startM, b.h, b.m);
    } else if (dateStr > aDateStr && dateStr < bDateStr) {
      // 中間整天:用工時類型標準時段
      hours = calcLeaveHoursRange(rule.startH, rule.startM, rule.endH, rule.endM);
    }
  }
  return { type, hours, desc: rest.trim() };
}

// 解析同一備註裡的「所有」[xxx]...段落
// 用於徐沛淇 3/28 那種 "[加班補休]...|[加班補休]...|[特休假]..." 的情況
// 回傳 [{type, hours, desc}, ...]
function parseAllLeavesFromNote(record, rule) {
  if (!record.note || !record.note.includes('[')) return [];
  const result = [];
  // 用正則抓出所有 [類型]日期/時間... 段落
  // 每段從 [ 開始,直到下一個 [ 或字串結尾
  const regex = /\[([^\]]+)\]([^\[]*)/g;
  let match;
  while ((match = regex.exec(record.note)) !== null) {
    const type = match[1];
    const rest = match[2].trim();
    // 清掉開頭的標點符號(逗號、頓號、|、空格等)
    const cleanRest = rest.replace(/^[,,、|\s]+/, '').replace(/[,,、|\s]+$/, '');
    if (!cleanRest) continue;
    // 用原 calcDayLeaveFromNote 邏輯算單段時數
    const mock = { date: record.date, note: `[${type}]${cleanRest}` };
    const parsed = calcDayLeaveFromNote(mock, rule);
    if (parsed.type) {
      result.push({ type: parsed.type, hours: parsed.hours, desc: parsed.desc });
    }
  }
  return result;
}

// 計算某筆記錄當日的「實際時數」(用於稽核)
// 包含:打卡時段(扣午休)+ 請假時數 + 加班補休時數
// 不含:加班時數(加班是額外不能補正常工時)
function calcDayActualHours(record, rule) {
  if (!record) return { actualHours: 0, isFullDayLeave: false };

  let hours = 0;
  let isFullDayLeave = false;  // 是否整天請假(當天沒打卡、但有請假備註)

  // 1. 打卡時段
  if (record.punchIn && record.punchOut) {
    const [h1, m1] = record.punchIn.split(':').map(Number);
    const [h2, m2] = record.punchOut.split(':').map(Number);
    hours += calcSingleDayHours(h1, m1, h2, m2);
  }

  // 2. 解析所有請假 / 加班補休段落
  const segments = parseAllLeavesFromNote(record, rule);
  let leaveTotal = 0;
  let otCompTotal = 0;
  let hasLeave = false;
  for (const seg of segments) {
    if (seg.type === '加班') continue;  // 加班不算入當日時數
    if (seg.type === '加班補休') {
      otCompTotal += seg.hours;
    } else {
      leaveTotal += seg.hours;
      hasLeave = true;
    }
  }

  hours += leaveTotal + otCompTotal;

  // 判斷是否「整天請假」:沒打卡 + 有任何請假備註
  // (員工根本沒來,不能享有業務類型的通勤補貼 1hr)
  // 例如 3/30 [生理假] 10:30~18:30 雖請假只有 7hr(跨午休),但員工當天沒來
  // 仍視為整天請假 → 標準 8hr,實際 7hr → 稽核 1hr
  const hasPunch = !!(record.punchIn || record.punchOut);
  if (!hasPunch && hasLeave) {
    isFullDayLeave = true;
  }

  return { actualHours: Math.round(hours * 100) / 100, isFullDayLeave };
}

// 匯出薪資總表 + 每位員工一個 sheet
async function exportReport() {
  const wb = new ExcelJS.Workbook();
  wb.creator = '員工考勤薪資系統';
  wb.created = new Date();

  // 員工排序規則:
  //   1. 有在「月薪匯入檔」中的員工 → 按匯入順序
  //   2. 未在匯入檔中的員工 → 按姓名筆劃升冪(localeCompare zh-Hant)
  const importOrder = state.salaryImportOrder || [];
  const allNames = Object.keys(state.employees);
  const inImport = importOrder.filter(n => state.employees[n]);
  const rest = allNames
    .filter(n => !importOrder.includes(n))
    .sort((a, b) => a.localeCompare(b, 'zh-Hant'));
  const names = [...inImport, ...rest];

  // ========== 建立該月完整日期序列,並計算平日/週末天數 ==========
  const allDates = new Set();
  for (const n of names) {
    for (const r of state.employees[n].records) {
      if (r.date) allDates.add(r.date);
    }
  }
  const datesArr = [...allDates].sort();
  let sortedDates = datesArr;
  let weekdayCount = 0;  // 本月平日(週一至週五)
  let weekendCount = 0;  // 本月週六日
  if (datesArr.length > 0) {
    const [yy, mm] = datesArr[0].split('-').map(Number);
    const lastDay = new Date(yy, mm, 0).getDate();
    sortedDates = [];
    for (let d = 1; d <= lastDay; d++) {
      sortedDates.push(`${yy}-${String(mm).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
      const w = new Date(yy, mm - 1, d).getDay();
      if (w === 0 || w === 6) weekendCount++;
      else weekdayCount++;
    }
  }
  const totalDaysInMonth = sortedDates.length;

  // ========== Sheet 1: 薪資總表 ==========
  const summary = wb.addWorksheet('薪資總表', { views: [{ state: 'frozen', ySplit: 3 }] });

  // 第 1 行:標題
  summary.mergeCells('A1:U1');
  summary.getCell('A1').value = `薪資統計總表 · ${state.period}`;
  summary.getCell('A1').font = { bold: true, size: 14 };
  summary.getCell('A1').alignment = { vertical: 'middle', horizontal: 'left' };
  summary.getRow(1).height = 24;

  // 第 2 行:本月摘要(紅字)
  summary.mergeCells('A2:U2');
  summary.getCell('A2').value = `本月總天數:${totalDaysInMonth}  |  非六日天數(平日):${weekdayCount}  |  六日天數:${weekendCount}  |  員工總數:${names.length}`;
  summary.getCell('A2').font = { size: 12, color: { argb: 'FFD43F3A' }, bold: true };
  summary.getCell('A2').alignment = { vertical: 'middle', horizontal: 'left' };
  summary.getRow(2).height = 22;

  // 第 3 行:欄位表頭
  const summaryHeaders = [
    { name: '員工姓名', width: 12 },
    { name: '工時類型', width: 18 },
    { name: '出勤天數', width: 10 },
    { name: '應出勤', width: 10 },
    { name: '漏打卡天數', width: 12 },
    { name: '事假時數', width: 10 },
    { name: '普通傷病假時數', width: 14 },
    { name: '特休假時數', width: 12 },
    { name: '生理假時數', width: 12 },
    { name: '公假時數', width: 10 },
    { name: '婚假時數', width: 10 },
    { name: '喪假時數', width: 10 },
    { name: '加班時數', width: 10 },
    { name: '加班補休時數', width: 14 },
    { name: '稽核時數', width: 10 },
    { name: '月薪', width: 10 },
    { name: '漏打卡扣款', width: 12 },

    ws.getCell('A2').value = `期間:${state.period}`;
    ws.mergeCells('A2:B2');
    ws.getCell('A2').font = { size: 12, color: { argb: 'FF333333' } };
    ws.getCell('A2').alignment = { vertical: 'middle' };

    ws.getCell('C2').value = `月薪:${sal.monthly.toLocaleString()}`;
    ws.getCell('C2').font = { size: 12, color: { argb: 'FF333333' } };
    ws.getCell('C2').alignment = { vertical: 'middle' };

    ws.getCell('D2').value = `時薪:${sal.hourlyWage.toLocaleString()}`;
    ws.getCell('D2').font = { size: 12, color: { argb: 'FF333333' } };
    ws.getCell('D2').alignment = { vertical: 'middle' };

    // 實發薪資 — 黃底 + 粗體,跨到 G 欄
    ws.mergeCells('E2:G2');
    ws.getCell('E2').value = `實發薪資:${sal.finalSalary.toLocaleString()}`;
    ws.getCell('E2').font = { size: 12, color: { argb: 'FF1A1A1A' }, bold: true };
    ws.getCell('E2').fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF200' } };
    ws.getCell('E2').alignment = { vertical: 'middle' };
    ws.getRow(2).height = 22;

    // 第 3 行:本月總天數 + 非六日天數(紅字)
    ws.mergeCells('A3:G3');
    ws.getCell('A3').value = `本月總天數:${totalDaysInMonth}    非六日天數:${weekdayCount}`;
    ws.getCell('A3').font = { size: 12, color: { argb: 'FFD43F3A' }, bold: true };
    ws.getCell('A3').alignment = { vertical: 'middle' };
    ws.getRow(3).height = 20;

    // 第 4 行:出勤天數 + 應出勤 + 漏打卡 + 扣款 + 加班(紅字)
    let line4 = `出勤天數:${emp.stats.punchedDays}`;
    if (sal.isShift) {
      line4 += `  |  應出勤:${sal.expectedWorkDays}天(本月${sal.monthTotalDays}天-月休8天)`;
    } else {
      line4 += `  |  應出勤:${sal.expectedWorkDays}天(本月非六日天數)`;
    }
    line4 += `  |  漏打卡:${sal.missedDays}天`;
    if (sal.missedDeduct > 0) {
      line4 += `(-${sal.missedDeduct.toLocaleString()})`;
    }
    line4 += `  |  事假扣款:${sal.personalDeduct ? '-' + sal.personalDeduct.toLocaleString() : '0'}`;
    line4 += `  |  傷病假扣款:${sal.sickDeduct ? '-' + sal.sickDeduct.toLocaleString() : '0'}`;
    line4 += `  |  加班時數:${sal.otHours}  |  加班補休:${sal.otCompHours}`;
    ws.mergeCells('A4:G4');
    ws.getCell('A4').value = line4;
    ws.getCell('A4').font = { size: 12, color: { argb: 'FFD43F3A' }, bold: true };
    ws.getCell('A4').alignment = { vertical: 'middle', wrapText: true };
    ws.getRow(4).height = 36;

    // ===== 表頭(第 5 行) =====
    const headers = ['日期', '星期', '上班時間', '下班時間', '備註', '請假時數', '扣薪', '稽核', '稽核扣薪'];
    const headerR = ws.getRow(5);
    headers.forEach((h, i) => {
      const cell = headerR.getCell(i + 1);
      cell.value = h;
      cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A1A1A' } };
      cell.alignment = { horizontal: 'center', vertical: 'middle' };
    });
    // 稽核兩欄表頭紅字
    headerR.getCell(8).font = { bold: true, color: { argb: 'FFFFC0C0' } };
    headerR.getCell(9).font = { bold: true, color: { argb: 'FFFFC0C0' } };
    headerR.height = 22;

    // 日期欄強制文字格式(避免 Excel 自動轉 3/1/26)
    ws.getColumn(1).numFmt = '@';

    // ===== 建立「日期 → record」映射 =====
    const recordMap = {};
    for (const r of emp.records) {
      if (r.date) recordMap[r.date] = r;
    }

    // ===== 資料列(從第 6 行起) =====
    const hourlyWage = sal.hourlyWage;
    let rowIdx = 6;

    for (const dateStr of sortedDates) {
      const r = recordMap[dateStr];
      const [y, m, d] = dateStr.split('-').map(Number);
      const jsDate = new Date(y, m - 1, d);
      const weekday = weekdayZh[jsDate.getDay()];

      let inTime = '—', outTime = '—', leaveDesc = '';
      let leaveHoursNum = 0, deductNum = 0;
      let isMissedPunch = false; // 漏打卡:缺卡且備註空白

      if (r) {
        if (r.punchIn) inTime = r.punchIn;
        if (r.punchOut) outTime = r.punchOut;

        const parsed = calcDayLeaveFromNote(r, rule);
        if (parsed.type) {
          leaveDesc = `[${parsed.type}] ${parsed.desc}`;
          const isLeaveType = !['加班', '加班補休'].includes(parsed.type);
          if (isLeaveType) {
            leaveHoursNum = parsed.hours;
          }
          if (parsed.type === '事假' && parsed.hours > 0) {
            deductNum = Math.round(parsed.hours * hourlyWage);
          } else if (parsed.type === '普通傷病假' && parsed.hours > 0) {
            deductNum = Math.round(parsed.hours * hourlyWage * 0.5);
          }
        } else if (r.note) {
          leaveDesc = r.note;
        }

        // 漏打卡判斷:缺上班卡或下班卡、且備註全空
        const hasIn = !!r.punchIn;
        const hasOut = !!r.punchOut;
        const hasNote = !!(r.note && r.note.trim());
        if ((!hasIn || !hasOut) && !hasNote) {
          isMissedPunch = true;
        }
      }

      const row = ws.getRow(rowIdx);
      // 日期欄位:用純文字格式 + @ numFmt,防止 Excel 自動轉 3/1/26
      const dateCell = row.getCell(1);
      dateCell.numFmt = '@';
      dateCell.value = dateStr;
      dateCell.alignment = { horizontal: 'left', vertical: 'middle' };

      const wdCell = row.getCell(2);
      wdCell.value = weekday;
      wdCell.alignment = { horizontal: 'center', vertical: 'middle' };

      // 判斷打卡狀態
      const hasIn = r && !!r.punchIn;
      const hasOut = r && !!r.punchOut;
      const onlyOneMissing = r && (hasIn !== hasOut);  // 只缺其中一張(XOR)

      const inCell = row.getCell(3);
      inCell.value = inTime;
      inCell.alignment = { horizontal: 'center', vertical: 'middle' };
      if (onlyOneMissing) {
        // 只缺一張卡 → 紅字
        inCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
      } else if (inTime === '—') {
        // 兩張都缺 → 灰字
        inCell.font = { color: { argb: 'FFBBBBBB' } };
      }

      const outCell = row.getCell(4);
      outCell.value = outTime;
      outCell.alignment = { horizontal: 'center', vertical: 'middle' };
      if (onlyOneMissing) {
        outCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
      } else if (outTime === '—') {
        outCell.font = { color: { argb: 'FFBBBBBB' } };
      }

      const descCell = row.getCell(5);
      descCell.value = leaveDesc || '';
      descCell.alignment = { horizontal: 'left', vertical: 'middle' };

      const hoursCell = row.getCell(6);
      if (leaveHoursNum > 0) {
        hoursCell.value = leaveHoursNum;
        hoursCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
      }
      hoursCell.alignment = { horizontal: 'right', vertical: 'middle' };
      hoursCell.numFmt = '0.##';

      const dedCell = row.getCell(7);
      if (deductNum > 0) {
        dedCell.value = -deductNum;
        dedCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
      }
      dedCell.alignment = { horizontal: 'right', vertical: 'middle' };
      dedCell.numFmt = '#,##0';

      // 週末淡灰底
      const wd = jsDate.getDay();
      if (wd === 0 || wd === 6) {
        for (let c = 1; c <= 7; c++) {
          row.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF5F5F0' } };
        }
        wdCell.font = { color: { argb: 'FFC9A961' }, bold: true };
      }

      // 漏打卡:上班時間、下班時間兩格改淡黃底(覆蓋可能的週末灰底)
      if (isMissedPunch) {
        inCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF8C4' } };
        outCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF8C4' } };
      }

      // ===== 稽核計算 =====
      // 標準工時:
      //   - 業務類型:整天請假時 8hr,其餘 7hr
      //   - 其他類型:一律 8hr
      // 實際時數 = 打卡時段 + 所有請假時數 + 當日加班補休(加班不算)
      // 不足 = max(0, 標準 − 實際)
      // 以下情況不計稽核:
      //   - 漏打卡日(缺卡+無備註) — 已由 V3 漏打卡扣薪處理
      //   - 只缺一張卡 — 視為忘打卡,員工實際有上班(例如只打了上班卡但有加班備註)
      //   - 稽核時數 < 0.5hr — 避免打卡時間零星誤差造成的小扣款
      const auditCell = row.getCell(8);
      const auditDedCell = row.getCell(9);
      auditCell.alignment = { horizontal: 'right', vertical: 'middle' };
      auditCell.numFmt = '0.##';
      auditDedCell.alignment = { horizontal: 'right', vertical: 'middle' };
      auditDedCell.numFmt = '#,##0';

      let hasAuditDeduct = false;  // 該日是否有稽核扣款

      if (r && !isMissedPunch && !onlyOneMissing) {
        const { actualHours, isFullDayLeave } = calcDayActualHours(r, rule);

        // 特殊情況:無打卡 + 沒請假 + 只有加班備註 → 視為排休日加班,稽核不計
        const hasPunch = !!(r.punchIn || r.punchOut);
        const segments = parseAllLeavesFromNote(r, rule);
        const hasOnlyOvertime = segments.length > 0 && segments.every(s => s.type === '加班');

        const isYangMei = (emp.workType || '').includes('楊梅-週一至週五')
                      || (emp.workType || '').includes('楊梅-排休');
        const isSatSun = wd === 0 || wd === 6;

        if (!hasPunch && hasOnlyOvertime) {
          // 排休日加班,稽核不計
        } else if (isFullDayLeave) {
          // 整天請假(無打卡 + 有請假):比對標準 8hr
          const rawShortfall = Math.max(0, 8 - actualHours);
          const shortfall = Math.round(rawShortfall * 2) / 2;
          if (shortfall >= 0.5) {
            const auditDed = Math.round(shortfall * hourlyWage);
            auditCell.value = shortfall;
            auditCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
            auditDedCell.value = -auditDed;
            auditDedCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
            hasAuditDeduct = true;
          }
        } else if (hasPunch) {
          // 有打卡日 ===== V29 規則 =====
          // 通用:
          //   - 實際工時 > 7hr → 豁免稽核
          //   - 遲到容忍 15 分、下班不容忍
          //   - 稽核 = 遲到 + 早退(封頂 4hr、四捨五入 0.5、< 0.5 不計)
          // 業務類型:
          //   - 工時 > 6hr → 目標下班 = 標準 − 1hr(18:30)
          //   - 工時 ≤ 6hr → 目標下班 = 標準(19:30)
          // 楊梅週末(楊梅-週一至週五 / 楊梅-排休,且週六/日):
          //   - 工時 > 5hr → 視為滿 8hr,豁免
          //   - 工時 ≤ 5hr → 稽核 = 8 − 工時(封頂 4hr)
          const isSalesRole = (emp.workType || '').includes('業務');
          const stdIn = rule.startH + rule.startM / 60;
          const stdOut = rule.endH + rule.endM / 60;

          const [ih, im] = r.punchIn.split(':').map(Number);
          const [oh, om] = r.punchOut.split(':').map(Number);
          const rawIn = ih + im / 60;
          const rawOut = oh + om / 60;

          const paidCover = segments
            .filter(s => s.type !== '加班')
            .reduce((sum, s) => sum + s.hours, 0);

          // 實際工時(扣午休 if 跨)
          let workHours = Math.max(0, rawOut - rawIn);
          if (rawIn <= 12.5 && rawOut >= 13.5 && workHours >= 5) workHours -= 1;
          workHours += paidCover;

          let rawShortfall = 0;

          if (isYangMei && isSatSun) {
            // 楊梅週末:工時 > 5hr 豁免、≤ 5hr 用 8 − 工時
            if (workHours > 5) {
              rawShortfall = 0;
            } else {
              rawShortfall = Math.max(0, 8 - workHours);
            }
          } else if (workHours > 7) {
            // 通用豁免:工時 > 7hr
            rawShortfall = 0;
          } else {
            // 稽核目標下班時間
            const outTarget = (isSalesRole && workHours > 6) ? (stdOut - 1) : stdOut;
            // 遲到容忍 15 分、早退不容忍
            const late = Math.max(0, rawIn - (stdIn + 0.25));
            const earlyOut = Math.max(0, outTarget - rawOut);
            rawShortfall = late + earlyOut;
            rawShortfall = Math.max(0, rawShortfall - paidCover);
          }

          rawShortfall = Math.min(rawShortfall, 4);
          const shortfall = Math.round(rawShortfall * 2) / 2;
          if (shortfall >= 0.5) {
            const auditDed = Math.round(shortfall * hourlyWage);
            auditCell.value = shortfall;
            auditCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
            auditDedCell.value = -auditDed;
            auditDedCell.font = { color: { argb: 'FFD43F3A' }, bold: true };
            hasAuditDeduct = true;
          }
        }
      }

      // 週末淡灰底延伸到新加的兩欄
      if (wd === 0 || wd === 6) {
        auditCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF5F5F0' } };
        auditDedCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF5F5F0' } };
      }

      // 該日有稽核扣款 → 整列淺藍底(覆蓋週末灰底)
      if (hasAuditDeduct) {
        const auditFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD6EAF8' } };
        for (let c = 1; c <= 9; c++) {
          row.getCell(c).fill = auditFill;
        }
      }

      rowIdx++;
    }

    // 總計列
    const lastDataRow = rowIdx - 1;
    const totalRow = ws.getRow(rowIdx);
    totalRow.getCell(1).value = '合計';
    ws.mergeCells(rowIdx, 1, rowIdx, 5);
    totalRow.getCell(1).alignment = { horizontal: 'right', vertical: 'middle' };
    totalRow.getCell(1).font = { bold: true };

    const sumH = totalRow.getCell(6);
    sumH.value = { formula: `SUM(F6:F${lastDataRow})`, result: 0 };
    sumH.font = { color: { argb: 'FFD43F3A' }, bold: true };
    sumH.alignment = { horizontal: 'right', vertical: 'middle' };
    sumH.numFmt = '0.##';

    const sumD = totalRow.getCell(7);
    sumD.value = { formula: `SUM(G6:G${lastDataRow})`, result: 0 };
    sumD.font = { color: { argb: 'FFD43F3A' }, bold: true };
    sumD.alignment = { horizontal: 'right', vertical: 'middle' };
    sumD.numFmt = '#,##0';

    // 稽核合計
    const sumAudit = totalRow.getCell(8);
    sumAudit.value = { formula: `SUM(H6:H${lastDataRow})`, result: 0 };
    sumAudit.font = { color: { argb: 'FFD43F3A' }, bold: true };
    sumAudit.alignment = { horizontal: 'right', vertical: 'middle' };
    sumAudit.numFmt = '0.##';

    const sumAuditDed = totalRow.getCell(9);
    sumAuditDed.value = { formula: `SUM(I6:I${lastDataRow})`, result: 0 };
    sumAuditDed.font = { color: { argb: 'FFD43F3A' }, bold: true };
    sumAuditDed.alignment = { horizontal: 'right', vertical: 'middle' };
    sumAuditDed.numFmt = '#,##0';

    // 總計列底色延伸到 9 欄
    for (let c = 1; c <= 9; c++) {
      totalRow.getCell(c).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF9EE' } };
    }
    totalRow.height = 22;

    // 欄寬
    ws.getColumn(1).width = 12;
    ws.getColumn(2).width = 6;
    ws.getColumn(3).width = 11;
    ws.getColumn(4).width = 11;
    ws.getColumn(5).width = 46;
    ws.getColumn(6).width = 10;
    ws.getColumn(7).width = 12;
    ws.getColumn(8).width = 8;   // 稽核
    ws.getColumn(9).width = 11;  // 稽核扣薪
  }

  // ========== 下載 ==========
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  // 時間戳 YYYYMMDD-HHMMSS(使用當下時間,方便區分不同匯出版本)
  const now = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  const timestamp = `${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
  a.download = `薪資統計_${state.period || 'report'}_${APP_VERSION}_${timestamp}.xlsx`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function reset() {
  state.rawData = null;
  state.employees = {};
  state.fileName = '';
  state.period = '';
  state.selectedEmp = null;
  document.getElementById('dropMain').textContent = '點擊或拖曳檔案至此處';
  document.getElementById('uploadError').classList.add('hidden');
  render();
}

function updateSalary(name, val) {
  if (state.employees[name]) {
    state.employees[name].salary = Number(val);
    render();
  }
}
function updateWorkDays(name, val) {
  if (state.employees[name]) {
    state.employees[name].workDays = Number(val);
    render();
  }
}

// =============== Render ===============
function render() {
  const hasData = state.rawData !== null;
  document.getElementById('uploadScreen').classList.toggle('hidden', hasData);
  document.getElementById('mainLayout').classList.toggle('hidden', !hasData);

  const actions = document.getElementById('headerActions');
  if (hasData) {
    actions.innerHTML = `
      <div class="period-box">
        <div class="lbl">Period</div>
        <div class="val">${esc(state.period)}</div>
      </div>
      <div class="divider"></div>
      <button class="btn btn-gold" onclick="downloadTemplate()">${ICONS.download} 月薪範本</button>
      <button class="btn btn-gold" onclick="document.getElementById('salaryFileInput').click()">${ICONS.sheet} 匯入月薪</button>
      <div class="divider"></div>
      <button class="btn btn-outline" onclick="reset()">重新上傳</button>
      <button class="btn btn-primary" onclick="exportReport()">${ICONS.download} 匯出報表</button>
    `;
  } else {
    actions.innerHTML = '';
  }

  if (!hasData) return;

  const empList = Object.values(state.employees).sort((a,b) => a.name.localeCompare(b.name, 'zh-Hant'));
  document.getElementById('empCount').textContent = `· ${empList.length}`;

  // Sidebar
  document.getElementById('empListEl').innerHTML = empList.map(emp => {
    const s = calcSalary(emp.name);
    const isSel = state.selectedEmp === emp.name;
    const hasAlert = (emp.stats.leaveHours['事假']||0) > 0 || (emp.stats.leaveHours['普通傷病假']||0) > 0 || emp.stats.missedPunch > 0;
    const isDefault = emp.salary === undefined;
    return `
      <div class="emp-card ${isSel ? 'active' : ''}" onclick="selectEmp('${esc(emp.name)}')">
        <div style="min-width:0;flex:1">
          <div class="name serif">${esc(emp.name)}${hasAlert ? '<span class="dot" title="有影響薪資的假別"></span>' : ''}</div>
          <div class="wtype">${esc(emp.workType || '—')}</div>
        </div>
        <div class="salary">
          <div class="n">${s.finalSalary.toLocaleString()}</div>
          <div class="u ${isDefault ? 'default' : ''}">${isDefault ? '預設薪資' : 'TWD'}</div>
        </div>
      </div>
    `;
  }).join('');

  // Main
  if (state.selectedEmp && state.employees[state.selectedEmp]) {
    renderDetail(state.selectedEmp);
  } else {
    renderOverview(empList);
  }
}

function selectEmp(name) {
  state.selectedEmp = name;
  render();
}
function backToOverview() {
  state.selectedEmp = null;
  render();
}

  document.getElementById('detailPanel').innerHTML = `
    <div class="animate-in">

      ${unsetAlert}

      <div class="stats-grid">

        <div class="stat accent"><div class="lbl">本期薪資總支出</div><div class="val-group"><div class="val">${totalSalary.toLocaleString()}</div><div class="unit">TWD</div></div></div>
        <div class="stat"><div class="lbl">加班時數合計</div><div class="val-group"><div class="val">${totalOT.toFixed(1)}</div><div class="unit">小時</div></div></div>
        <div class="stat"><div class="lbl">扣款合計</div><div class="val-group"><div class="val">${totalDeduct.toLocaleString()}</div><div class="unit">TWD</div></div></div>
      </div>

      <div class="section-h">員工明細</div>
      <div class="table-box">
        <div class="table-head">

          <div class="r">月薪</div><div class="r">實發薪資</div><div></div>
        </div>
        ${rowsHtml}

      <div class="footer-note">

      </div>
    </div>
  `;
}

function renderDetail(name) {
  const emp = state.employees[name];
  const s = calcSalary(name);
  const leaveEntries = Object.entries(emp.stats.leaveHours).filter(([,h]) => h > 0);

  const isDefaultSalary = emp.salary === undefined;
  const isDefaultDays = emp.workDays === undefined;

  const breakdownRows = [];
  breakdownRows.push(`<div class="b-row"><div class="lbl">月薪(基準)</div><div class="val" style="color:#1a1a1a">+${s.monthly.toLocaleString()}</div></div>`);
  if (s.missedDays > 0) {
    const desc = s.isShift
      ? `漏打卡 ${s.missedDays} 天 × 日薪 ${s.dailyWage}(應出勤 ${s.expectedWorkDays} 天 = 本月 ${s.monthTotalDays} 天 − 月休 8 天,實際 ${emp.stats.punchedDays} 天)`
      : `漏打卡 ${s.missedDays} 天 × 日薪 ${s.dailyWage}(應出勤 ${s.expectedWorkDays} 天 = 本月非六日天數,實際 ${emp.stats.punchedDays} 天)`;
    breakdownRows.push(`<div class="b-row"><div class="lbl">${desc}</div><div class="val" style="color:#b85">−${s.missedDeduct.toLocaleString()}</div></div>`);
  }
  if (s.personalHrs > 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">事假 ${s.personalHrs} 小時 × 時薪 ${s.hourlyWage}(全扣)</div><div class="val" style="color:#b85">−${s.personalDeduct.toLocaleString()}</div></div>`);
  }
  if (s.sickHrs > 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">普通傷病假 ${s.sickHrs} 小時 × 時薪 ${s.hourlyWage} × 0.5(半薪)</div><div class="val" style="color:#b85">−${s.sickDeduct.toLocaleString()}</div></div>`);
  }
  if (s.personalHrs === 0 && s.sickHrs === 0 && s.missedDays === 0) {
    breakdownRows.push(`<div class="b-row"><div class="lbl">無扣款項目</div><div class="val" style="color:#999">—</div></div>`);
  }

  const leavesHtml = leaveEntries.length === 0 ? '' : `
    <div class="section-h">請假彙整</div>
    <div class="leaves-grid">
      ${leaveEntries.map(([type, h]) => {
        const isDeduct = type === '事假' || type === '普通傷病假';
        return `
          <div class="leave-card ${isDeduct ? 'deduct' : ''}">
            <div class="lbl">${esc(type)}${isDeduct ? '<span class="flag">· 影響薪資</span>' : ''}</div>
            <div class="val">${h} <span class="u">小時</span></div>
          </div>
        `;
      }).join('')}
    </div>
  `;

  // 日期排序:record.date 已統一為 yyyy-mm-dd
  const sortedRecords = [...emp.records].sort((a, b) => {
    const ka = a.date || '', kb = b.date || '';
    if (ka === kb) return 0;
    const cmp = ka < kb ? -1 : 1;
    return state.recordSort === 'asc' ? cmp : -cmp;
  });
  const sortArrow = state.recordSort === 'asc' ? '↑' : '↓';
  const sortLabel = state.recordSort === 'asc' ? '日期升冪' : '日期降冪';

  const recordRows = sortedRecords.map(r => {
    const dstr = r.date || '';
    const inTime = r.punchIn || '—';
    const outTime = r.punchOut || '—';
    return `
      <div class="records-row">
        <div class="d">${esc(dstr)}</div>
        <div class="t ${inTime === '—' ? 'empty' : ''}">${esc(inTime)}</div>
        <div class="t ${outTime === '—' ? 'empty' : ''}">${esc(outTime)}</div>
        <div class="note ${!r.note ? 'empty' : ''}">${esc(r.note || '—')}</div>
      </div>
    `;
  }).join('');

  document.getElementById('detailPanel').innerHTML = `
    <div class="animate-in">
      <button class="back-btn" onclick="backToOverview()">${ICONS.close} 返回總覽</button>

      <div class="detail-head">
        <div>
          <div class="eyebrow-gold">Employee Detail</div>
          <h2 class="detail-name serif">${esc(emp.name)}</h2>
          <div class="detail-wtype">
            ${esc(emp.workType || '工時類型未標示')}
            <span style="color:#c9a961;margin-left:8px">· ${String(emp.stats.rule.startH).padStart(2,'0')}:${String(emp.stats.rule.startM).padStart(2,'0')}–${String(emp.stats.rule.endH).padStart(2,'0')}:${String(emp.stats.rule.endM).padStart(2,'0')}</span>
            <span style="color:#888;margin-left:6px">· ${emp.stats.rule.isShift ? '排休制' : '週休制'}</span>
          </div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Noto Sans TC',sans-serif;font-size:10px;letter-spacing:2px;color:#888;text-transform:uppercase">實發薪資</div>
          <div class="detail-salary-big">${s.finalSalary.toLocaleString()}</div>
          <div style="font-family:'Noto Sans TC',sans-serif;font-size:11px;color:#888">TWD</div>
        </div>
      </div>

      <div class="section-h">薪資設定</div>
      <div class="config-fields">
        <div class="cf">
          <div class="row"><span>月薪</span>${isDefaultSalary ? `<span class="tiny">預設:${state.defaultSalary.toLocaleString()}</span>` : ''}</div>
          <div id="salary-display" class="display" onclick="startEditSalary()">
            <div class="v">${s.monthly.toLocaleString()}</div>
            <div class="u">TWD</div>
            <div class="edit-icon">${ICONS.edit}</div>
          </div>
        </div>
        <div class="cf">
          <div class="row"><span>當月應出勤天數</span>${isDefaultDays ? `<span class="tiny">預設:${state.defaultWorkDays}天</span>` : ''}</div>
          <div id="days-display" class="display" onclick="startEditDays()">
            <div class="v">${s.workDays}</div>
            <div class="u">天</div>
            <div class="edit-icon">${ICONS.edit}</div>
          </div>
        </div>
      </div>
      <div class="wage-info">
        <div>日薪:<span class="num" style="color:#1a1a1a;margin-left:6px">${s.dailyWage.toLocaleString()}</span> 元</div>
        <div>時薪:<span class="num" style="color:#1a1a1a;margin-left:6px">${s.hourlyWage.toLocaleString()}</span> 元</div>
      </div>

      <div style="height:32px"></div>
      <div class="section-h">薪資計算明細</div>
      <div class="breakdown">
        ${breakdownRows.join('')}
        <div class="b-total">
          <div class="lbl">實發薪資</div>
          <div class="val">${s.finalSalary.toLocaleString()} TWD</div>
        </div>
      </div>

      <div class="section-h">出勤統計</div>
      <div class="small-stats" style="grid-template-columns: repeat(6, 1fr)">
        <div class="sm"><div class="lbl">總記錄天數</div><div class="val">${emp.stats.totalDays}</div></div>
        <div class="sm"><div class="lbl">正常打卡天</div><div class="val">${emp.stats.punchedDays}</div></div>
        <div class="sm"><div class="lbl">應出勤</div><div class="val">${s.expectedWorkDays}</div></div>
        <div class="sm"><div class="lbl">漏打卡天數</div><div class="val" style="color:${s.missedDays > 0 ? '#d43' : '#1a1a1a'}">${s.missedDays}</div></div>
        <div class="sm"><div class="lbl">加班時數</div><div class="val" style="color:${s.otHours > 0 ? '#285' : '#1a1a1a'}">${s.otHours}</div></div>
        <div class="sm"><div class="lbl">加班補休時數</div><div class="val" style="color:${s.otCompHours > 0 ? '#285' : '#1a1a1a'}">${s.otCompHours}</div></div>
      </div>

      ${leavesHtml}

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="section-h" style="margin-bottom:0">逐日打卡紀錄</div>
        <button class="btn btn-outline" onclick="toggleRecordSort()" style="padding:6px 12px;font-size:11px">
          ${sortLabel} ${sortArrow}
        </button>
      </div>
      <div class="records-list">
        <div class="records-head">
          <div style="cursor:pointer" onclick="toggleRecordSort()" title="點擊切換排序">日期 ${sortArrow}</div><div>上班</div><div>下班</div><div>說明</div>
        </div>
        ${recordRows}
      </div>
    </div>
  `;
}

function startEditSalary() {
  const el = document.getElementById('salary-display');
  const current = state.employees[state.selectedEmp].salary ?? state.defaultSalary;
  el.outerHTML = `
    <div class="edit-row">
      <input type="number" id="salaryInput" value="${current}" autofocus>
      <button class="save" onclick="saveSalary()">${ICONS.check}</button>
      <button class="cancel" onclick="render()">${ICONS.close}</button>
    </div>
  `;
  const inp = document.getElementById('salaryInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveSalary();
    if (e.key === 'Escape') render();
  });
}
function saveSalary() {
  const v = document.getElementById('salaryInput').value;
  updateSalary(state.selectedEmp, v);
}

function startEditDays() {
  const el = document.getElementById('days-display');
  const current = state.employees[state.selectedEmp].workDays ?? state.defaultWorkDays;
  el.outerHTML = `
    <div class="edit-row">
      <input type="number" id="daysInput" value="${current}" autofocus>
      <button class="save" onclick="saveDays()">${ICONS.check}</button>
      <button class="cancel" onclick="render()">${ICONS.close}</button>
    </div>
  `;
  const inp = document.getElementById('daysInput');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') saveDays();
    if (e.key === 'Escape') render();
  });
}
function saveDays() {
  const v = document.getElementById('daysInput').value;
  updateWorkDays(state.selectedEmp, v);
}

function toggleRecordSort() {
  state.recordSort = state.recordSort === 'asc' ? 'desc' : 'asc';
  render();
}

// =============== Event wiring ===============
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) parseFile(e.target.files[0]);
});

document.getElementById('salaryFileInput').addEventListener('change', e => {
  if (e.target.files[0]) {
    importSalary(e.target.files[0]);
    e.target.value = '';
  }
});

const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag');
  if (e.dataTransfer.files[0]) parseFile(e.dataTransfer.files[0]);
});
</script>
</body>
</html>
